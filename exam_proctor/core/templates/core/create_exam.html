{% extends 'core/base.html' %}

{% block title %}Create Exam{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">➕ Create New Exam</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="title" class="form-label">Exam Title</label>
                            <input type="text" class="form-control" name="title" id="title"
                                   placeholder="e.g., Mathematics Mid-Semester Exam" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <select class="form-select" name="subject" id="subject" required>
                                    <option value="">Select Subject</option>
                                    {% for subject in subjects %}
                                        <option value="{{ subject.id }}">{{ subject.code }} - {{ subject.name }}</option>
                                    {% endfor %}
                                </select>
                                <small class="text-muted">
                                    <a href="{% url 'core:create_subject' %}">+ Create new subject</a>
                                </small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="duration" class="form-label">Duration (minutes)</label>
                                <input type="number" class="form-control" name="duration" id="duration"
                                       min="5" max="300" value="60" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="total_marks" class="form-label">Total Marks</label>
                                <input type="number" class="form-control" name="total_marks" id="total_marks"
                                       value="100" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="passing_marks" class="form-label">Passing Marks</label>
                                <input type="number" class="form-control" name="passing_marks" id="passing_marks"
                                       value="40" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="start_time" class="form-label">Start Time</label>
                                <input type="datetime-local" class="form-control" name="start_time" id="start_time" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="end_time" class="form-label">End Time</label>
                                <input type="datetime-local" class="form-control" name="end_time" id="end_time" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description (Optional)</label>
                            <textarea class="form-control" name="description" id="description" rows="2"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="instructions" class="form-label">Exam Instructions (Optional)</label>
                            <textarea class="form-control" name="instructions" id="instructions" rows="3"
                                      placeholder="e.g., Use of calculator is allowed."></textarea>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="is_practice_mode" id="is_practice_mode">
                            <label class="form-check-label" for="is_practice_mode">
                                Practice Mode (No proctoring, no timer enforcement)
                            </label>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Create Exam</button>
                            <a href="{% url 'core:teacher_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Set default start time to now
const now = new Date();
now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
document.getElementById('start_time').value = now.toISOString().slice(0, 16);

// Set default end time to 1 hour from now
const endTime = new Date(now.getTime() + 60 * 60000);
document.getElementById('end_time').value = endTime.toISOString().slice(0, 16);
</script>
{% endblock %}
